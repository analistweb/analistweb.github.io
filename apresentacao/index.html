<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>analist.com — Apresentação</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS — analist.com v2
   Contraste AA/AAA em ambos os modos
═══════════════════════════════════════════ */
:root {
  /* Base palette */
  --background-dark : #0C1118;
  --background-light: #F0EDE8;
  --primary         : #1B3D5C;
  --secondary       : #2A4D42;
  --accent1         : #C85C2A;
  --accent2         : #6BA8A0;

  /* Semantic tokens — dark mode default */
  --bg              : var(--background-dark);
  --surface         : #131A25;
  --text            : #EAE8E3;
  --text-inv        : #12191F;
  --muted           : rgba(234,232,227,0.48);
  --border          : rgba(234,232,227,0.08);
  --border-strong   : rgba(107,168,160,0.22);
  --glow-a1         : rgba(200,92,42,0.18);
  --glow-a2         : rgba(107,168,160,0.18);

  /* Transition timing */
  --theme-transition: 420ms cubic-bezier(0.4,0,0.2,1);
}

/* Light mode overrides */
[data-theme="light"] {
  --bg      : var(--background-light);
  --surface : #E8E5DF;
  --text    : #12191F;
  --text-inv: #EAE8E3;
  --muted   : rgba(18,25,31,0.5);
  --border  : rgba(18,25,31,0.1);
  --border-strong: rgba(27,61,92,0.25);
  --glow-a1 : rgba(200,92,42,0.12);
  --glow-a2 : rgba(107,168,160,0.12);
}

/* Smooth theme transition — all properties */
*, *::before, *::after {
  margin:0;padding:0;box-sizing:border-box;
  transition:
    background-color var(--theme-transition),
    border-color var(--theme-transition),
    color var(--theme-transition),
    box-shadow var(--theme-transition),
    opacity var(--theme-transition);
}
/* Exclude transform and layout from blanket transition */
canvas, img { transition: filter var(--theme-transition), opacity var(--theme-transition); }

/* ─── BODY ─── */
body {
  background:#020509;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;gap:28px;
  font-family:'DM Sans',sans-serif;
}

/* ─── DEMO FRAME ─── */
.demo-wrap {
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.demo-note {
  font-family:'JetBrains Mono',monospace;
  font-size:11px;letter-spacing:2px;
  color:rgba(234,232,227,.22);
  text-transform:uppercase;text-align:center;
}
.demo-tokens {
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  margin-top:4px;
}
.token-chip {
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:4px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  font-family:'JetBrains Mono',monospace;font-size:9.5px;
  color:rgba(234,232,227,.5);letter-spacing:1px;
}
.token-swatch {
  width:10px;height:10px;border-radius:2px;flex-shrink:0;
}

/* ─── TRIGGER BUTTON ─── */
#av-trigger {
  display:inline-flex;align-items:center;gap:12px;
  padding:15px 32px;border-radius:6px;
  background:var(--accent1);
  border:none;
  color:#EAE8E3;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;
  letter-spacing:.4px;
  box-shadow:0 0 32px var(--glow-a1, rgba(200,92,42,0.18));
  transition:transform .25s cubic-bezier(0.34,1.56,0.64,1),
             box-shadow .25s,background-color var(--theme-transition) !important;
}
#av-trigger:hover {
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 8px 40px rgba(200,92,42,0.35);
}
.play-icon {
  width:26px;height:26px;border-radius:50%;
  background:rgba(234,232,227,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;flex-shrink:0;
}

/* ─── THEME TOGGLE ─── */
#theme-toggle {
  position:fixed;top:20px;right:20px;
  width:38px;height:38px;border-radius:50%;
  background:rgba(234,232,227,.06);
  border:1px solid rgba(234,232,227,.1);
  color:rgba(234,232,227,.7);
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:10000;
  transition:background .2s,transform .2s var(--theme-transition) !important;
}
#theme-toggle:hover {
  background:rgba(107,168,160,.15);
  border-color:var(--accent2);
  transform:scale(1.1) rotate(15deg);
}

/* ─── MODAL OVERLAY ─── */
#av-overlay {
  position:fixed;inset:0;
  background:rgba(0,0,0,0);
  z-index:9998;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(0px);
  transition:background .45s ease, backdrop-filter .45s ease !important;
  pointer-events:none;
}
#av-overlay.open {
  background:rgba(8,10,18,.9);
  backdrop-filter:blur(14px);
  pointer-events:all;
}

/* light mode overlay */
[data-theme="light"] #av-overlay.open {
  background:rgba(30,40,55,.82);
}

/* ─── VIDEO BOX ─── */
#av-box {
  position:relative;
  width:min(920px,95vw);
  aspect-ratio:16/9;
  background:#0C1118;
  border:1px solid var(--border-strong);
  border-radius:14px;
  overflow:hidden;
  transform:scale(.84) translateY(28px);
  opacity:0;
  transition:transform .65s cubic-bezier(0.34,1.56,0.64,1),
             opacity .5s ease,
             box-shadow var(--theme-transition) !important;
  box-shadow:
    0 40px 120px rgba(0,0,0,.75),
    0 0 0 1px rgba(107,168,160,.08),
    0 0 60px var(--glow-a2);
}
#av-overlay.open #av-box {
  transform:scale(1) translateY(0);
  opacity:1;
}

/* ─── CLOSE BTN ─── */
#av-close {
  position:absolute;top:14px;right:16px;z-index:20;
  width:30px;height:30px;border-radius:50%;
  background:rgba(234,232,227,.06);
  border:1px solid rgba(234,232,227,.1);
  color:#EAE8E3;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s !important;
}
#av-close:hover {
  background:rgba(200,92,42,.2);
  border-color:var(--accent1);
  transform:scale(1.1);
}

/* ─── PROGRESS BAR ─── */
#av-progress {
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:rgba(234,232,227,.05);z-index:20;
}
#av-progress-fill {
  height:100%;width:0%;
  background:linear-gradient(90deg,#6BA8A0,#C85C2A);
  box-shadow:0 0 8px #6BA8A0;
  transition:width .1s linear !important;
}

/* ─── SOUND / TIME ─── */
#av-sound {
  position:absolute;bottom:12px;right:16px;z-index:20;
  font-size:17px;cursor:pointer;opacity:.55;
  transition:opacity .2s,transform .2s !important;
  background:none;border:none;
}
#av-sound:hover { opacity:1;transform:scale(1.15); }
#av-time {
  position:absolute;bottom:12px;left:16px;z-index:20;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:2px;
  color:rgba(234,232,227,0.48);
}

/* ─── THEME TRANSITION VEIL ─── */
/* Subtle blur veil during theme switch */
body.theme-switching #av-box { filter:blur(2px); }

/* ─── CANVAS ─── */
#av-canvas {position:absolute;inset:0;width:100%;height:100%;}
</style>
</head>
<body>

<!-- THEME TOGGLE -->
<button id="theme-toggle" title="Alternar tema" onclick="toggleTheme()">☀️</button>

<!-- DEMO -->
<div class="demo-wrap">
  <p class="demo-note"></p>

  <button id="av-trigger" onclick="avOpen()">
    <div class="play-icon">▶</div>
    Ver apresentação
  </button>

  <!-- Token reference chips -->
  <div class="demo-tokens">
    <div class="token-chip"><div class="token-swatch" style="background:#0C1118;border:1px solid #333"></div></div>
    <div class="token-chip"><div class="token-swatch" style="background:#F0EDE8"></div></div>
    <div class="token-chip"><div class="token-swatch" style="background:#1B3D5C"></div></div>
    <div class="token-chip"><div class="token-swatch" style="background:#2A4D42"></div>s</div>
    <div class="token-chip"><div class="token-swatch" style="background:#C85C2A"></div></div>
    <div class="token-chip"><div class="token-swatch" style="background:#6BA8A0"></div></div>
  </div>
</div>

<!-- MODAL -->
<div id="av-overlay">
  <div id="av-box">
    <canvas id="av-canvas"></canvas>
    <button id="av-close" onclick="avClose()">✕</button>
    <div id="av-progress"><div id="av-progress-fill"></div></div>
    <div id="av-time">0:00 / 1:00</div>
    <button id="av-sound" onclick="avToggleSound()">🔇</button>
  </div>
</div>

//  DESIGN TOKENS — JS mirror (canvas draws)
// ═══════════════════════════════════════════════════

  accent1  : '#C85C2A',   // Cobre Queimado
  accent2  : '#6BA8A0',   // Sage Petróleo
  text     : '#EAE8E3',
  muted    : 'rgba(234,232,227,0.5)',

// ─── THEME TOGGLE ───────────────────────────────────
let currentTheme = 'dark';
function toggleTheme(){
  document.body.classList.add('theme-switching');
  currentTheme = currentTheme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('theme-toggle').textContent = currentTheme==='dark'?'☀️':'🌙';
  setTimeout(()=>document.body.classList.remove('theme-switching'), 450);
}

// ─── CANVAS ─────────────────────────────────────────
const canvas = document.getElementById('av-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){
  const box = document.getElementById('av-box');
  W = canvas.width  = box.clientWidth  || 900;

// ─── WEB AUDIO — Epic Tech Beat ─────────────────────
let audioCtx=null, masterGain=null, soundOn=false, schedLast=0, arpIdx=0;
const BPM=128, BEAT_S=60/BPM;
const ARP=[261.6,311.1,392,466.2,523.2,622.3,783.9,622.3,523.2,466.2,392,311.1];
const BASS_NOTES=[55,55,41.2,55,55,55,49,55];

function initAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=0;
  masterGain.connect(audioCtx.destination);
}
function kick(t){
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.frequency.setValueAtTime(160,t);
  o.frequency.exponentialRampToValueAtTime(38,t+.07);
  g.gain.setValueAtTime(.8,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+.25);
}
function hihat(t,vel=.14){
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.05,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const s=audioCtx.createBufferSource(),f=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
  s.buffer=buf;f.type='highpass';f.frequency.value=8500;
  g.gain.setValueAtTime(vel,t);g.gain.exponentialRampToValueAtTime(.001,t+.05);
  s.connect(f);f.connect(g);g.connect(masterGain);s.start(t);s.stop(t+.06);
}
function bass(t,freq,dur=BEAT_S*2){
  const o=audioCtx.createOscillator(),fl=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
  o.type='sawtooth';o.frequency.value=freq;fl.type='lowpass';fl.frequency.value=380;
  g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(fl);fl.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.05);
}
function synth(t,freq,dur=.18,vol=.07){
  const o=audioCtx.createOscillator(),fl=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
  o.type='square';o.frequency.value=freq;fl.type='bandpass';fl.frequency.value=freq*2;
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(fl);fl.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.05);
}
function pad(t,dur=2){
  [110,165,220].forEach(f=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.035,t+.5);
    g.gain.linearRampToValueAtTime(.035,t+dur-.5);g.gain.linearRampToValueAtTime(0,t+dur);
    o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.1);
  });
}
function scheduleBeats(fromT,toT,el){
  if(!audioCtx||!soundOn) return;
  if(el<8){ if(fromT<audioCtx.currentTime+.05) pad(audioCtx.currentTime+.1,4); return; }
  const s16=BEAT_S/4;
  for(let t=fromT;t<toT;t+=s16){
    const pos=Math.round((t-(audioCtx.currentTime-el+8))/s16)%32;
    if(pos<0) continue;
    if([0,8,16,24].includes(pos%32)) kick(t);
    if([0,4,8,12,16,20,24,28].includes(pos%32)) hihat(t,el>20?.18:.1);
    if(pos%32===0) bass(t,BASS_NOTES[Math.floor(pos/4)%BASS_NOTES.length],BEAT_S*2);
    if(el>12&&pos%2===0){ synth(t,ARP[arpIdx%ARP.length],.15,el>30?.09:.055); arpIdx++; }
    if(el>40&&pos%16===8) kick(t);
  }
}

// ─── EASING + HELPERS ───────────────────────────────
const eOut   = t=>1-Math.pow(1-t,3);
const eIn    = t=>t*t*t;
const lerp   = (a,b,t)=>a+(b-a)*Math.min(1,Math.max(0,t));
const remap  = (t,a,b)=>Math.min(1,Math.max(0,(t-a)/(b-a)));
const fadeIn = (t,a,b)=>eOut(remap(t,a,b));
const fadeOut= (t,a,b)=>1-eIn(remap(t,a,b));
const inOut  = (t,a,b,c,d)=>fadeIn(t,a,b)*fadeOut(t,c,d);

// ─── PARTICLES ──────────────────────────────────────
const parts=[];
for(let i=0;i<55;i++) parts.push({x:Math.random(),y:Math.random()+.1,vx:(Math.random()-.5)*.0003,vy:-Math.random()*.0002-.00005,r:Math.random()*.0035+.001,life:Math.random()});
function tickParts(){ parts.forEach(p=>{ p.x+=p.vx;p.y+=p.vy;p.life+=.003; if(p.y<-.05||p.life>1){p.y=1.05;p.x=Math.random();p.life=0;} }); }

// ─── DRAW HELPERS ───────────────────────────────────
function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function txt(text,x,y,size,color,alpha,font='Bebas Neue',align='center'){
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;
  ctx.font=`${size}px '${font}'`;ctx.textAlign=align;ctx.textBaseline='middle';
  ctx.fillText(text,x,y);ctx.restore();
}
function mono(t,x,y,s,c,a,al='center'){ txt(t,x,y,s,c,a,'JetBrains Mono',al); }
function sans(t,x,y,s,c,a,al='center'){ txt(t,x,y,s,c,a,'DM Sans',al); }

function hexBg(alpha){
  const R=H*.042;
  ctx.save();ctx.globalAlpha=alpha*.1;ctx.strokeStyle=T.accent2;ctx.lineWidth=.55;
  const cols=Math.ceil(W/(R*2))+2, rows=Math.ceil(H/(R*1.73))+2;
  for(let row=0;row<rows;row++) for(let col=0;col<cols;col++){
    const x=-R+col*R*2+(row%2)*R, y=-R+row*R*1.73;
    ctx.beginPath();
    for(let k=0;k<6;k++){ const a=(k*60-30)*Math.PI/180; k?ctx.lineTo(x+R*.8*Math.cos(a),y+R*.8*Math.sin(a)):ctx.moveTo(x+R*.8*Math.cos(a),y+R*.8*Math.sin(a)); }
    ctx.closePath();ctx.stroke();
  }
  ctx.restore();
}

function hline(y,col,alpha,w=W*.45){
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=col;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2-w/2,y);ctx.lineTo(W/2+w/2,y);ctx.stroke();ctx.restore();
}

function glitch(text,x,y,size,alpha,t){
  const i=Math.sin(t*40)*.5+.5;
  ctx.save();
  ctx.globalAlpha=alpha*i*.25;ctx.fillStyle=T.accent2;ctx.font=`${size}px 'Bebas Neue'`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,x+W*.007,y);
  ctx.fillStyle=T.accent1;ctx.fillText(text,x-W*.005,y+H*.003);
  ctx.globalAlpha=alpha;ctx.fillStyle=T.text;ctx.fillText(text,x,y);
  ctx.restore();
}

function vignette(alpha){
  ctx.save();ctx.globalAlpha=alpha;
  const g=ctx.createRadialGradient(W/2,H/2,H*.18,W/2,H/2,H*.82);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.6)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.restore();
}

function scanlines(){
  ctx.save();ctx.globalAlpha=.035;
  for(let y=0;y<H;y+=3){ctx.fillStyle='#000';ctx.fillRect(0,y,W,1);}
  ctx.restore();
}

function counter(val,x,y,size,alpha,dur,t,startT){
  const cur=Math.round(remap(t,startT,startT+dur)*val);
  txt(String(cur),x,y,size,T.accent2,alpha);
}

function drawCard(cx,cy,ch,cw,icon,title,desc,tag,color,alpha){
  if(alpha<=0) return;
  const w=cw*.88,x=cx-w/2,y=cy-ch/2;
  ctx.save();ctx.globalAlpha=alpha;
  // bg
  ctx.fillStyle='rgba(12,17,24,0.92)';rr(x,y,w,ch,H*.014);ctx.fill();
  // border
  ctx.strokeStyle=`rgba(107,168,160,0.16)`;ctx.lineWidth=1;rr(x,y,w,ch,H*.014);ctx.stroke();
  // top bar — accent color
  ctx.fillStyle=color;ctx.fillRect(x,y,w,2);
  // icon
  ctx.font=`${H*.048}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(icon,cx,cy-ch*.28);
  // title
  ctx.font=`${H*.036}px 'Bebas Neue'`;ctx.fillStyle=T.text;ctx.fillText(title,cx,cy-ch*.04);
  // desc
  ctx.font=`${H*.023}px 'DM Sans'`;ctx.fillStyle='rgba(234,232,227,0.6)';
  desc.split('\n').forEach((l,i)=>ctx.fillText(l,cx,cy+ch*.12+i*H*.034));
  // tag
  ctx.font=`${H*.017}px 'JetBrains Mono'`;ctx.fillStyle=color;ctx.fillText(tag,cx,cy+ch*.38);
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  MAIN DRAW — 60s timeline
// ═══════════════════════════════════════════════════
function draw(t){
  ctx.clearRect(0,0,W,H);

  // bg gradient — Tinta Profunda
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0C1118');bg.addColorStop(1,'#080d14');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // particles
  ctx.save();
  parts.forEach(p=>{
    ctx.globalAlpha=p.life<.5?p.life*.35:(1-p.life)*.35;
    ctx.fillStyle=t<25?T.accent2:T.accent1;
    ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r*W,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();

  // ── 0–7s: LOGO ───────────────────────────────────
  if(t<7){
    hexBg(inOut(t,0,3,5,7));
    const la=inOut(t,.5,3.5,5.5,7), ls=lerp(.72,1,eOut(remap(t,.5,3)));
    if(logoImg.complete&&la>0){
      const lw=H*.34;
      ctx.save();ctx.globalAlpha=la;
      ctx.filter=`drop-shadow(0 0 ${38*la}px rgba(107,168,160,${la*.55}))`;
      ctx.drawImage(logoImg,W/2-lw/2-W*.07,H/2-lw/2-H*.05,lw*ls,lw*ls);
      ctx.filter='none';ctx.restore();
    }
    const ba=inOut(t,2,4,5.5,7);
    glitch('analist',W/2+W*.115,H/2-H*.02,H*.092,ba,t);
    txt('.com',W/2+H*.21,H/2-H*.02,H*.092,T.accent2,ba);
    mono('// estruturas digitais que trabalham por você',W/2,H/2+H*.09,H*.021,T.accent2,ba*.65);
  }

  // ── 5–15s: PROBLEMA ──────────────────────────────
  if(t>=5&&t<15){
    hexBg(inOut(t,5,8,13,15)*.5);
    mono('// o problema',W/2,H*.28,H*.024,T.accent2,inOut(t,6,8.5,12.5,14.5));
    txt('Seu negócio',W/2,H*.42,H*.1,T.text,inOut(t,6.5,9,12,14.5));
    txt('está online.',W/2,H*.55,H*.1,T.text,inOut(t,7,9.5,12,14.5));
    const ainv=inOut(t,9,10.5,12.5,14.5);
    if(ainv>0){
      ctx.save();ctx.globalAlpha=ainv;ctx.fillStyle=T.accent1;
      ctx.font=`${H*.108}px 'Bebas Neue'`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor=T.accent1;ctx.shadowBlur=50*ainv;
      ctx.fillText('MAS ESTÁ INVISÍVEL.',W/2,H*.7);ctx.restore();
    }
  }

  // ── 13–25s: ESTATÍSTICAS ─────────────────────────
  if(t>=13&&t<25){
    const sa=inOut(t,13,15.5,23.5,25);
    hexBg(sa*.3);
    mono('// dados do mercado',W/2,H*.15,H*.023,T.accent2,sa);
    hline(H*.23,T.accent2,sa*.35,W*.5);

    const s1=inOut(t,14,16.5,23,25);
    if(s1>0){

// ═══════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════
const TOTAL=60;
let startTime=null, elapsed=0, rafId=null, running=false;

function loop(ts){
  if(!running) return;
  if(!startTime) startTime=ts;
  elapsed=Math.min((ts-startTime)/1000,TOTAL);

  if(audioCtx&&soundOn){
    const now=audioCtx.currentTime;
    if(now-schedLast>.1){ scheduleBeats(now,now+.2,elapsed); schedLast=now; }
  }

  resize(); draw(elapsed);

  document.getElementById('av-progress-fill').style.width=(elapsed/TOTAL*100)+'%';
  const s=Math.floor(elapsed);
  document.getElementById('av-time').textContent=`0:${String(s).padStart(2,'0')} / 1:00`;

  if(elapsed>=TOTAL){ avEnd(); return; }
  rafId=requestAnimationFrame(loop);
}
function avEnd(){ running=false; draw(TOTAL); }

// ═══════════════════════════════════════════════════
//  MODAL CONTROL
// ═══════════════════════════════════════════════════
function avOpen(){
  document.getElementById('av-overlay').classList.add('open');
  resize();
  running=true;startTime=null;elapsed=0;schedLast=0;arpIdx=0;
  rafId=requestAnimationFrame(loop);
}
function avClose(){
  document.getElementById('av-overlay').classList.remove('open');
  running=false;if(rafId) cancelAnimationFrame(rafId);
  if(audioCtx&&masterGain) masterGain.gain.setTargetAtTime(0,audioCtx.currentTime,.2);
  soundOn=false;document.getElementById('av-sound').textContent='🔇';
}
function avToggleSound(){
  initAudio();soundOn=!soundOn;
  document.getElementById('av-sound').textContent=soundOn?'🔊':'🔇';
  if(masterGain){
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.setTargetAtTime(soundOn?.07:0,audioCtx.currentTime,.4);
  }
}
document.getElementById('av-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('av-overlay')) avClose();
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') avClose(); });
</script>
